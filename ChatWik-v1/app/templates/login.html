<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<!----------------------------------------StyleSheet------------------------------------>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
	<link rel="stylesheet" href="{{ url_for('static', filename='styles/login.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='styles/components.css') }}">
	<!-------------------------------------JavaScript------------------------------------>
	<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
	<script type="module" src="{{ url_for('static', filename='scripts/login.js') }}"></script>
        <title>Login</title>
    </head>
    <body>
        <div class="entire-box flex">
            <div class="cw-description">
                <div class="description-content">
                    <p>ChatWik</p>
                    <p>Chat Seamlessly With Friends and Family</p>
                </div>
            </div>

            <div class="entire-login-box">
                <div class="login-box">
                    <form id="login-form">
                        <div class="common" id="header">
                            <h1>Sign in</h1>

			    <!-- Notification Div -->
			    <div class="auth__alert__msg"></div>

                        </div>
                        <div class="form-group common">
                            <input class="form-control" placeholder="Email" type="email" id="email" name="email" required>
                            <i class="fas fa-envelope"></i>
                        </div>
                        <div class="form-group common">
                            <input class="form-control" placeholder="Password" type="password" id="password" name="password" required>
                            <p class="fas fa-2 fa-eye" id="passwordIconId"></p>
                        </div>

                        <div class="common forget-pwd">
                            <a href="forget_pwd.html">Forgot Password?</a>
                        </div>
                        <div class="common submit-button">
                            <button type="submit" id="signin-btn" class="btn btn-success">Login</button>
                            <br>
			    <p>Don't have an account? <a href="{{ url_for('app.register') }}">Register</a></p>
                        </div>
                    </form>
		    <div class="loader"></div>
                </div>
                
            </div>
        </div>


    </body>
</html>
